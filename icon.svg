<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1c480a"/>
      <stop offset="100%" stop-color="#061204"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect width="512" height="512" rx="90" fill="none" stroke="#76FF03" stroke-width="10" opacity="0.5"/>
  <!-- Zombie emoji large -->
  <text x="256" y="330" font-size="300" text-anchor="middle" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji">🧟</text>
  <!-- MATH label -->
  <text x="256" y="450" font-size="88" text-anchor="middle"
        font-family="'Arial Rounded MT Bold', Arial, sans-serif"
        font-weight="900" fill="#76FF03"
        style="text-shadow:0 0 20px #76FF03">MATH</text>
  <!-- Small decorative math symbols -->
  <text x="80"  y="200" font-size="52" text-anchor="middle"
        font-family="Arial, sans-serif" fill="#FFF176" opacity="0.6">+</text>
  <text x="432" y="200" font-size="52" text-anchor="middle"
        font-family="Arial, sans-serif" fill="#FFF176" opacity="0.6">×</text>
  <text x="80"  y="390" font-size="52" text-anchor="middle"
        font-family="Arial, sans-serif" fill="#FFF176" opacity="0.6">−</text>
  <text x="432" y="390" font-size="52" text-anchor="middle"
        font-family="Arial, sans-serif" fill="#FFF176" opacity="0.6">=</text>
</svg>
